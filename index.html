<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>68092306 ชื่อ นามสกุล กลุ่ม</title>
</head>

<body class="bg-light">

    <div class="container text-center mt-5">

        <!-- หัวข้อ -->
        <h1 class="mb-4 text-primary">การเปลี่ยนรูปภาพแบบสุ่ม</h1>

        <!-- Card -->
        <div class="card shadow mx-auto" style="max-width: 700px;">
            <div class="card-body">

                <!-- รูป -->
                <img id="cake" src="pictures/cake1.jpg"
                     class="img-fluid rounded mb-3"
                     alt="รูปเค้ก">

                <!-- ข้อความ -->
                <p class="text-muted">
                    Lorem ipsum dolor sit amet consectetur adipisicing elit.
                </p>

                <!-- ปุ่ม -->
                <button class="btn btn-warning"
                        onclick="changeSrc()">
                    เปลี่ยนรูปเค้ก
                </button>

            </div>
        </div>

    </div>

    <script>
        const images = [
            "pictures/cake1.jpg",
            "pictures/cake2.jpg",
            "pictures/cake3.jpg",
            "pictures/cake4.jpg"
        ];

        function changeSrc() {
            const randomIndex = Math.floor(Math.random() * images.length);
            document.getElementById("cake").src = images[randomIndex];
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>68092306 กุลธวัช คงเม่น </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        img {
            width: 640px;
            height: 426px;
            object-fit: cover;
            display: block;
            margin-bottom: 15px;
        }

        p {
            max-width: 640px;
            font-size: 16px;
            line-height: 1.6;
        }

        input[type="button"] {
            padding: 8px 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>การเปลี่ยนรูปภาพแบบสุ่ม</h1>

    <p>
        <img id="cake" src="pictures\cake1.jpg" width="640" height="426" alt="รูปเค้ก">
    </p>

    <p>
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Magnam, tenetur.
    </p>

    <input type="button" value="เปลี่ยนรูปเค้ก" onclick="changeSrc()">

    <script>
        const images = ["pictures/cake1.jpg", "pictures/cake2.jpg", "pictures/cake3.jpg", "pictures/cake4.jpg", "pictures/cake5.jpg"];

        function changeSrc() {
            const randomIndex = Math.floor(Math.random() * images.length);
            document.getElementById("cake").setAttribute("src", images[randomIndex]);
        }
    </script>

</body>
</html>
